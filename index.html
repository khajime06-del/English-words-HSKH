<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSKH</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #e3f2fd, #90caf9);
}

.screen {
  display:none;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
  justify-content:center;
  align-items:center;
}

.active {
  display:flex;
  flex-direction:column;
}

.button {
  width:90%;
  max-width:400px;
  padding:18px;
  margin:8px;
  border-radius:20px;
  background:white;
  text-align:center;
  font-size:18px;
}

input, select {
  width:90%;
  max-width:400px;
  padding:12px;
  margin:6px;
  border-radius:12px;
  border:none;
}

.card {
  width:95%;
  max-width:400px;
  background:white;
  padding:15px;
  margin:5px;
  border-radius:15px;
}

#display {
  font-size:40px;
  margin:30px;
  text-align:center;
}

/* スプラッシュ */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s;
}
#splash.fadeout { opacity:0; }
#splash img { width:150px; }
</style>
</head>

<body>

<div id="splash">
  <img src="./logo.png">
</div>

<div id="register" class="screen">
  <h2>ユーザー登録</h2>
  <input id="username" placeholder="ユーザー名">
  <div class="button" onclick="registerUser()">登録</div>
</div>

<div id="home" class="screen">
  <h2>HSKH</h2>
  <div class="button" onclick="go('books')">単語帳一覧</div>
  <div class="button" onclick="go('input')">単語入力</div>
  <div class="button" onclick="go('learn')">学習</div>
</div>

<div id="books" class="screen">
  <div>
    <h2>単語帳一覧</h2>
    <input id="newBook" placeholder="単語帳名">
    <div class="button" onclick="createBook()">作成</div>
    <div id="bookList"></div>
    <div class="button" onclick="go('home')">戻る</div>
  </div>
</div>

<div id="input" class="screen">
  <div>
    <h2>単語入力</h2>
    <select id="bookSelect"></select>
    <input id="num" placeholder="番号">
    <input id="eng" placeholder="英語">
    <input id="jp" placeholder="日本語">
    <div class="button" onclick="saveWord()">保存</div>
    <div class="button" onclick="go('home')">戻る</div>
  </div>
</div>

<div id="list" class="screen">
  <div>
    <h2 id="listTitle"></h2>
    <div id="wordList"></div>
    <div class="button" onclick="go('books')">戻る</div>
  </div>
</div>

<div id="learn" class="screen">
  <div id="learnSetup">
    <select id="learnBookSelect"></select>
    <input id="start" placeholder="開始番号">
    <input id="end" placeholder="終了番号">
    <div class="button" onclick="startCountdown()">開始</div>
  </div>

  <div id="learnPlay" style="display:none;">
    <div id="display"></div>
    <div class="button" id="nextBtn" onclick="nextWord()" style="display:none;">次へ</div>
    <div class="button" id="retryBtn" onclick="restartStudy()" style="display:none;">もう一回</div>
    <div class="button" id="homeBtn" onclick="go('home')" style="display:none;">ホームへ</div>
  </div>
</div>

<script>
let currentUser = localStorage.getItem("currentUser");
let userData = JSON.parse(localStorage.getItem("userData")||"{}");

window.onload = ()=>{
  setTimeout(()=>{
    splash.classList.add("fadeout");
    setTimeout(()=>startApp(),1000);
  },3000);
};

function startApp(){
  splash.style.display="none";
  if(currentUser){ go("home"); } else { go("register"); }
}

function registerUser(){
  currentUser=username.value;
  localStorage.setItem("currentUser",currentUser);
  if(!userData[currentUser]) userData[currentUser]={};
  localStorage.setItem("userData",JSON.stringify(userData));
  go("home");
}

function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="learn"){
    learnSetup.style.display="block";
    learnPlay.style.display="none";
    nextBtn.style.display="none";
    retryBtn.style.display="none";
    homeBtn.style.display="none";
    display.innerText="";
  }

  if(id==="books") showBooks();
  if(id==="input") loadBookSelect();
  if(id==="list") showList();
  if(id==="learn") loadLearnBooks();
}

/* 単語帳 */
function createBook(){
  const name=newBook.value.trim();
  if(!name)return;
  if(userData[currentUser][name]) return;
  userData[currentUser][name]=[];
  localStorage.setItem("userData",JSON.stringify(userData));
  newBook.value="";
  showBooks();
}

function showBooks(){
  bookList.innerHTML="";
  Object.keys(userData[currentUser]).forEach(name=>{
    const div=document.createElement("div");
    div.className="button";
    div.innerText=name;
    div.onclick=()=>{localStorage.setItem("currentBook",name); go("list");};
    bookList.appendChild(div);
  });
}

/* 入力 */
function loadBookSelect(){
  bookSelect.innerHTML="";
  Object.keys(userData[currentUser]).forEach(name=>{
    let op=document.createElement("option");
    op.value=name;
    op.textContent=name;
    bookSelect.appendChild(op);
  });
}

function saveWord(){
  const book=bookSelect.value;
  let words=userData[currentUser][book]||[];

  const idx=words.findIndex(w=>w.num==num.value);

  if(idx!==-1){
    if(!confirm("上書きする？")) return;
    words[idx]={num:Number(num.value),eng:eng.value,jp:jp.value};
  }else{
    words.push({num:Number(num.value),eng:eng.value,jp:jp.value});
  }

  userData[currentUser][book]=words;
  localStorage.setItem("userData",JSON.stringify(userData));

  num.value=eng.value=jp.value="";
}

/* 一覧 */
function showList(){
  const book=localStorage.getItem("currentBook");
  listTitle.innerText=book;

  let words=userData[currentUser][book]||[];
  wordList.innerHTML="";

  words.sort((a,b)=>a.num-b.num);

  words.forEach((w,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText=`${w.num} ${w.eng} - ${w.jp}`;

    div.onclick=()=>{
      if(confirm("削除する？")){
        words.splice(i,1);
        userData[currentUser][book]=words;
        localStorage.setItem("userData",JSON.stringify(userData));
        showList();
      }
    };

    wordList.appendChild(div);
  });
}

/* 学習 */
function loadLearnBooks(){
  learnBookSelect.innerHTML="";
  Object.keys(userData[currentUser]).forEach(name=>{
    let op=document.createElement("option");
    op.value=name;
    op.textContent=name;
    learnBookSelect.appendChild(op);
  });
}

let studyList=[],index=0,timer;

function startCountdown(){
  nextBtn.style.display="none";
  retryBtn.style.display="none";
  homeBtn.style.display="none";
  display.innerText="";

  const book=learnBookSelect.value;
  let words=userData[currentUser][book]||[];

  studyList=words.filter(w=>w.num>=start.value && w.num<=end.value);

  // ★ランダム化
  studyList.sort(()=>Math.random()-0.5);

  index=0;

  learnSetup.style.display="none";
  learnPlay.style.display="block";

  let count=3;
  display.innerText=count;

  let countdown=setInterval(()=>{
    count--;
    if(count>0){
      display.innerText=count;
    }else{
      clearInterval(countdown);
      showWord();
    }
  },1000);
}

function showWord(){
  clearTimeout(timer);

  if(index>=studyList.length){
    display.innerText="🎉 完了！";
    nextBtn.style.display="none";
    retryBtn.style.display="block";
    homeBtn.style.display="block";
    return;
  }

  nextBtn.style.display="none";
  retryBtn.style.display="none";
  homeBtn.style.display="none";

  display.innerText=studyList[index].eng;

  timer=setTimeout(()=>{
    display.innerText=studyList[index].jp;
    nextBtn.style.display="block";
  },2000);
}

function nextWord(){
  index++;
  showWord();
}

function restartStudy(){
  startCountdown();
}
</script>

</body>
</html>
